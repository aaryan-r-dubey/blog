{% extends 'base/base.html' %}

{% block content %}

<section class="container mt-5">
    <div class="d-flex align-items-center mb-4">
        <div class="bg-warning rounded me-3" style="width: 4px; height: 30px;"></div>
        <h3 class="text-uppercase fw-bold text-warning mb-0" style="letter-spacing: 2px;">
            Category - {{ category }}
        </h3>
    </div>

    <div class="row">
        <div class="col-lg-8">
            {% for post in posts %}
            <div class="card bg-dark border-secondary mb-4 hover-lift">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <span class="badge bg-warning bg-opacity-20 text-dark">{{ post.category.category_name }}</span>
                        <small class="text-muted">{{ post.created_at|timesince }} ago</small>
                    </div>
                    <h4 class="card-title text-white mb-2">
                        <a href="{% url 'blogs' post.slug %}" class="text-white text-decoration-none">{{ post.title }}</a>
                    </h4>
                    <p class="card-text text-light mb-3">{{ post.short_description|truncatewords:20 }}</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-warning fw-bold">By {{ post.author }}</small>
                        <a href="{% url 'blogs' post.slug %}" class="btn btn-outline-warning btn-sm">Read More</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

{% endblock %}
