{% extends "./base/base.html" %}

{% block content%}

<section class="container mt-5">
    <div class="d-flex align-items-center mb-4">
        <div class="bg-info rounded me-3" style="width: 4px; height: 30px;"></div>
        <h3 class="text-uppercase fw-bold text-info mb-0" style="letter-spacing: 2px;">
            Search Results for - "{{ keyword }}"
        </h3>
    </div>

    <div class="row">
        <div class="col-lg-8">
            {% for i in blogs %}
            <div class="card bg-dark border-info mb-4 hover-lift">
                <div class="card-body p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <span class="badge bg-info bg-opacity-20 text-dark">{{ i.category.category_name }}</span>
                        <small class="text-muted">{{ i.created_at|timesince }} ago</small>
                    </div>
                    <h4 class="card-title text-white mb-2">
                        <a href="{% url 'blogs' i.slug %}" class="text-white text-decoration-none">{{ i.title }}</a>
                    </h4>
                    <p class="card-text text-light mb-3">{{ i.short_description|truncatewords:20 }}</p>
                    <div class="d-flex justify-content-between align-items-center">
                        <small class="text-info fw-bold">By {{ i.author }}</small>
                        <a href="{% url 'blogs' i.slug %}" class="btn btn-outline-info btn-sm">Read More</a>
                    </div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

{% endblock %}
