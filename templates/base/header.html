{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django Blogs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css?family=Playfair+Display:700,900" rel="stylesheet">
    <link href="{% static 'css/blog.css' %}" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .navbar-dark-custom {
            background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
            border-bottom: 2px solid #444;
        }
        .search-btn-custom {
            background: linear-gradient(45deg, #ff6b35, #f7931e);
            border: none;
            font-weight: 600;
        }
        .search-btn-custom:hover {
            background: linear-gradient(45deg, #e55a2b, #e0851a);
            transform: translateY(-1px);
        }
        .nav-link-custom {
            color: #ccc !important;
            font-weight: 500;
            transition: all 0.3s ease;
            border-radius: 20px;
            padding: 8px 16px !important;
        }
        .nav-link-custom:hover {
            color: #fff !important;
            background: rgba(255, 107, 53, 0.1);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="bg-dark text-light">
    <header class="navbar-dark-custom shadow-lg">
        <div class="container">
            <nav class="navbar navbar-expand-lg navbar-dark py-3">
                <div class="container-fluid">
                    <a class="navbar-brand fw-bold fs-2 text-warning" href="/">
                        <i class="fas fa-blog me-2"></i>BLoGiT
                    </a>
                    
                    <button class="navbar-toggler border-warning" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarContent">
                        <div class="navbar-nav mx-auto">
                            <form action="{% url 'search' %}" method="GET" class="d-flex">
                                <div class="input-group" style="min-width: 300px;">
                                    <input class="form-control bg-dark border-secondary text-light" name="keyword" type="text" placeholder="Search articles..." aria-label="Search">
                                    <button type="submit" class="btn search-btn-custom">
                                        <i class="fas fa-search"></i>
                                    </button>
                                </div>
                            </form>
                        </div>

                        <div class="navbar-nav ms-auto">
                            {% if not user.is_authenticated %}
                            <a class="btn btn-outline-warning me-2" href="{% url 'login' %}">
                                <i class="fas fa-sign-in-alt me-1"></i>Login
                            </a>
                            <a class="btn btn-warning" href="{% url 'register' %}">
                                <i class="fas fa-user-plus me-1"></i>Register
                            </a>
                            {% else %}
                            <a href="{% url 'dashboard' %}" class="btn btn-warning me-2">
                                <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                            </a>
                            <a href="{% url 'logout' %}" class="btn btn-outline-light">
                                <i class="fas fa-sign-out-alt me-1"></i>Logout
                            </a>
                            {% endif %}
                        </div>
                    </div>
                </div>
            </nav>

            <!-- Categories Navigation -->
            <div class="pb-3">
                <nav class="nav nav-pills justify-content-center flex-nowrap overflow-auto">
                    {% for cat in categories %}
                    <a class="nav-link nav-link-custom mx-1" href="{% url 'posts_by_category' cat.id %}">
                        {{ cat.category_name }}
                    </a>
                    {% endfor %}
                </nav>
            </div>
        </div>
    </header>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
