{% extends '../base/base.html' %}

{% block content %}
<div class="row">
    <!-- left sidebar -->
    {% include './leftsidebar.html' %}

    {% load crispy_forms_tags %}
    <!-- right sidebar -->
    <div class="col-md-9">
        <div class="card bg-dark border-warning shadow-lg">
            <div class="card-header border-warning bg-warning bg-opacity-10">
                <h3 class="text-warning mb-0">
                    <i class="fas fa-edit me-2"></i>Edit Category
                </h3>
            </div>
            <div class="card-body p-4">
                <form action="{% url 'edit_categories' category.id %}" method="POST">
                    {% csrf_token %}
                    <div class="text-light">
                        {{ form | crispy }}
                    </div>
                    <button type="submit" class="btn btn-warning px-4 py-2 fw-bold mt-3">
                        <i class="fas fa-save me-2"></i>Update Category
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<style>
.form-control, .form-select {
    background-color: #2d3748 !important;
    border: 1px solid #4a5568 !important;
    color: #e2e8f0 !important;
}

.form-control:focus, .form-select:focus {
    background-color: #2d3748 !important;
    border-color: #f59e0b !important;
    color: #e2e8f0 !important;
    box-shadow: 0 0 0 0.2rem rgba(245, 158, 11, 0.25) !important;
}

.form-text {
    color: #9ca3af !important;
}

.form-label {
    color: #e2e8f0 !important;
    font-weight: 500;
}
</style>

{% endblock %}
