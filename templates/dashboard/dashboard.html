{% extends '../base/base.html' %}

{% block content %}

<div class="row">
  <!-- leftsidebar -->
  {% include './leftsidebar.html' %}

  <!-- right sidebar -->
  <div class="col-md-9">
    <div class="row g-4">
      <div class="col-md-6">
        <div class="card bg-dark border-secondary shadow-lg h-100">
          <div class="card-header border-secondary text-center py-3">
            <h4 class="text-warning mb-0">
              <i class="fas fa-tags me-2"></i>All Categories
            </h4>
          </div>
          <div class="card-body text-center py-4">
            <h2 class="display-4 fw-bold text-info">{{ category_counts }}</h2>
            <p class="text-light mb-0">Total Categories</p>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card bg-dark border-secondary shadow-lg h-100">
          <div class="card-header border-secondary text-center py-3">
            <h4 class="text-warning mb-0">
              <i class="fas fa-file-alt me-2"></i>All Posts
            </h4>
          </div>
          <div class="card-body text-center py-4">
            <h2 class="display-4 fw-bold text-success">{{ blogs_counts }}</h2>
            <p class="text-light mb-0">Total Posts</p>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
