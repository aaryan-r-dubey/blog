{% extends './base/base.html'%}

{% block content %}

{% load crispy_forms_tags %}

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card bg-dark border-info shadow-lg">
                <div class="card-header bg-info bg-opacity-10 border-info text-center py-4">
                    <h3 class="text-info mb-0">
                        <i class="fas fa-user-plus me-2"></i>Register
                    </h3>
                </div>
                <div class="card-body p-5">
                    <form action="" method="POST">
                        {% csrf_token %}
                        <div class="text-light">
                            {{ form|crispy }}
                        </div>
                        <button type="submit" class="btn btn-info w-100 py-2 fw-bold mt-4">
                            <i class="fas fa-user-check me-2"></i>Register
                        </button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="text-muted">Already have an account? 
                            <a href="{% url 'login' %}" class="text-info text-decoration-none fw-bold">Login here</a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.form-control, .form-select {
    background-color: #2d3748 !important;
    border: 1px solid #4a5568 !important;
    color: #e2e8f0 !important;
}

.form-control:focus, .form-select:focus {
    background-color: #2d3748 !important;
    border-color: #0dcaf0 !important;
    color: #e2e8f0 !important;
    box-shadow: 0 0 0 0.2rem rgba(13, 202, 240, 0.25) !important;
}

.form-text {
    color: #9ca3af !important;
}

.form-label {
    color: #e2e8f0 !important;
    font-weight: 500;
}
</style>

{% endblock%}
